<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Labs - Coming Soon</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        header {
            background-color: #000000;
            padding: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -250px; /* This is your original desktop logo alignment */
        }
        .logo {
            height: 750px;
            max-width: 100%;
            width: auto;
            display: block;
        }
        
        /* Universal Navigation Tabs Menu */
        nav {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            margin-top: -180px; /* Kept perfectly lined up under your logo text */
            margin-bottom: 40px;
        }
        nav a {
            color: #a0aec0;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 10px 20px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        nav a:hover {
            color: #ffffff;
        }
        nav a.active {
            color: #1a8cff;
            border-bottom: 2px solid #1a8cff;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0px 20px 60px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .hero p {
            font-size: 18px;
            line-height: 1.6;
            color: #a0aec0;
            max-width: 650px;
            margin-bottom: 40px;
        }
        .cta-button {
            background-color: #1a8cff;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 35px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .cta-button:hover {
            background-color: #0066cc;
        }

        /* 📱 Mobile Layout Responsive Fix */
        @media (max-width: 768px) {
            header { margin-top: 0px; padding-top: 20px; }
            .logo { height: auto; max-width: 90%; }
            nav { margin-top: 20px; margin-bottom: 20px; gap: 5px; }
            nav a { font-size: 14px; padding: 8px 12px; }
            .hero h1 { margin-top: 10px !important; font-size: 32px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="engine-labs-header.png" class="logo" alt="Engine Labs Logo">
    </header>

    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main class="hero">
        <h1>COMING SOON</h1>
        <p>Engine Labs is currently optimizing its architecture. Next-generation software cultivation and mechanical diagnostics are under development.</p>
        <a href="mailto:jon@enginelabseugene.com" class="cta-button">Notify Me On Launch</a>
    </main>

</body>
</html>
