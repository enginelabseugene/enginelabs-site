<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Labs - Coming Soon</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prevents unwanted sideways scrolling on phones */
        }
        header {
            background-color: #000000;
            padding: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -250px;
        }
        .logo {
            height: 750px; 
            max-width: 100%; /* Ensures the huge logo auto-scales down on smaller screens */
            width: auto;
            display: block;
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0px 20px 60px 20px; /* Stripped top padding to keep elements tight */
            max-width: 900px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: -90px; 
            margin-bottom: 20px;
            color: #ffffff;
        }
        .hero p {
            font-size: 18px;
            line-height: 1.6;
            color: #a0aec0; 
            max-width: 650px;
            margin-bottom: 40px;
        }
        .cta-button {
            background-color: #1a8cff; 
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 15px 35px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .cta-button:hover {
            background-color: #0066cc; 
        }
    </style>
</head>
<body>

    <header>
        <!-- Your logo file sits perfectly here -->
        <img src="engine-labs-header.png" class="logo" alt="Engine Labs Logo">
    </header>

    <main class="hero">
        <h1>COMING SOON</h1>
        <p>Engine Labs is currently optimizing its architecture. Next-generation software cultivation and mechanical diagnostics are under development.</p>
        <a href="mailto:jon@enginelabseugene.com" class="cta-button">Notify Me On Launch</a>
    </main>

</body>
</html>
